name: 'Recurring ride'
type: recurring_ride
description: "Use <em>recurring ride</em> to add a recurring weekly ride to the calendar.<br>\r\nRides automatically appear in the <em>upcoming</em> block on the home page."
help: "<h5>Instructions</h5>\r\nComplete the form to create a <strong>NEW</strong> recurring ride. To update an <strong>existing</strong> ride <a href=\"/admin/content/rides\">find the ride</a> and edit it (for existing dates) or clone it for a new year.<br>\r\n<li><strong>Cancel</strong> a recurring ride date at <a href=\"/node/add/cancellation\">Content > Add content > Cancellation</a>.</li>\r\n<li><strong>Restore</strong> a canceled date at <a href=\"/admin/content/cancellations\">Content > Cancellations</a>.</li><br>"
