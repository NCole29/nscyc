          plugin_id: text
          empty: true
          content:
            value: "Table shows <strong>PayPal Instant Payments Notifications (IPN)</strong> - these are transactions processed by PayPal. \r\nPending transactions in CiviCRM are not shown if a form was filled but not completed through to the PayPal screen.\r\n<br>\r\nAccording to PayPal, <blockquote>The IPN message service is not a real-time service. IPNs can get lost or be delayed. To address these issues, the IPN message service includes a retry mechanism that re-sends a message at various intervals until your listener acknowledges receipt. An IPN message may be present up to four days after the original was sent.</blockquote>\r\nUpdate the CiviCRM status if the PayPal status is complete and the CiviCRM status is pending: <ol>\r\n<li>Click NAME to go to the CiviCRM dashboard, then click the Contributions tab.</li>\r\n<li>Identify the pending transaction with the <strong>date/time that matches</strong> the Payment date in the table below and click Edit.</li>\r\n<li>Change the Contribution status to Completed and Save. </li></ol>\r\n"
            format: basic_html
          tokenize: false
