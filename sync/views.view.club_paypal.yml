          plugin_id: text
          empty: false
          content:
            value: "Table shows <strrong>PayPal Instant Payments Notifications (IPN)</strong>. According to PayPal, <blockquote>The IPN message service is not a real-time service. IPNs can get lost or be delayed. To address these issues, the IPN message service includes a retry mechanism that re-sends a message at various intervals until your listener acknowledges receipt. An IPN message may be present up to four days after the original was sent.</blockquote>\r\nThese data are stored in the CiviCRM System Log in a JSON field and must be extracted and stored in a Drupal table to facilitate JOINS with other data tables, as displayed here.\r\nClick the button to process the data and update the table.\r\n<p class=\"dark-button\"><a href=\"/update-paypal-data\">Update PayPal data</a></p><br>\r\n"
