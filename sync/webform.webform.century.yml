id: century
title: Century
description: '<p><small>Provides paid registration for a single CiviCRM Event with <strong>Event type </strong>= Century. Update this form every year, there no need to duplicate it.&nbsp;</small><br><small>Each year:</small></p><ol><li><small>Clone the Drupal event page (to keep a record of past events) and edit the webpage</small></li><li><small>Go to&nbsp;</small><a href="/civicrm/event/manage?reset=1"><small>CiviCRM &gt; Manage Events</small></a><small>&nbsp;-&nbsp;Duplicate the Century event for a new year and change the date</small></li><li><small>Update this webform:</small><ol><li><small>Select event: <strong>Build &gt; CiviCRM &gt; Event Registration - select event </strong>(e.g., change&nbsp;''Blazing Saddles 2023'' to future years)</small></li><li><small>Update fees:&nbsp;<strong>Build &gt; Edit </strong>Fee<strong> &gt; Advanced</strong> &gt; change default value</small></li></ol></li></ol><p><small>Notes: If offering Member-only pricing, apply same updates to <strong>Century (Members)&nbsp;</strong>form.</small></p>'
categories:
  - 'Paid event'
elements: |-
  contact_pagebreak:
    '#type': webform_wizard_page
    '#form_key': contact_pagebreak
    '#title': 'Contact Information'
    civicrm_1_contact_1_fieldset_fieldset:
      '#type': fieldset
      '#title': '<h3>Your contact info</h3>'
      '#form_key': civicrm_1_contact_1_fieldset_fieldset
      member_markup:
        '#type': webform_markup
        '#markup': 'Members must login to get the member-only registration price.'
      civicrm_1_contact_1_contact_existing:
        '#type': civicrm_contact
        '#title': 'Existing Contact'
        '#widget': hidden
        '#none_prompt': '+ Create new +'
        '#results_display':
          display_name: display_name
        '#hide_fields':
          name: name
          email: email
        '#hide_method': disable
        '#no_hide_blank': true
        '#default': user
        '#allow_create': 1
        '#contact_type': individual
        '#form_key': civicrm_1_contact_1_contact_existing
        '#parent': civicrm_1_contact_1_fieldset_fieldset
        '#extra': {  }
      name_flex:
        '#type': webform_flexbox
        civicrm_1_contact_1_contact_first_name:
          '#type': textfield
          '#counter_type': character
          '#counter_maximum': 64
          '#counter_maximum_message': ' '
          '#contact_type': individual
          '#form_key': civicrm_1_contact_1_contact_first_name
          '#extra':
            width: 20
          '#parent': civicrm_1_contact_1_fieldset_fieldset
          '#title': 'First Name'
          '#required': true
        civicrm_1_contact_1_contact_last_name:
          '#type': textfield
          '#counter_type': character
          '#counter_maximum': 64
          '#counter_maximum_message': ' '
          '#contact_type': individual
          '#form_key': civicrm_1_contact_1_contact_last_name
          '#extra':
            width: 20
          '#parent': civicrm_1_contact_1_fieldset_fieldset
          '#title': 'Last Name'
          '#required': true
      civicrm_1_contact_1_email_email:
        '#type': email
        '#title': Email
        '#size': 25
        '#form_key': civicrm_1_contact_1_email_email
        '#extra':
          width: 20
        '#parent': civicrm_1_contact_1_fieldset_fieldset
        '#required': true
      civicrm_1_contact_1_cg1_fieldset:
        '#type': fieldset
        '#title': '<h3>Emergency Contact</h3>'
        '#form_key': civicrm_1_contact_1_cg1_fieldset
        '#parent': contact_pagebreak
        emerg_flex:
          '#type': webform_flexbox
          civicrm_1_contact_1_cg1_custom_1:
            '#type': textfield
            '#data_type': String
            '#form_key': civicrm_1_contact_1_cg1_custom_1
            '#extra':
              width: 20
            '#parent': civicrm_1_contact_1_cg1_fieldset
            '#title': Name
            '#required': true
          civicrm_1_contact_1_cg1_custom_2:
            '#type': textfield
            '#title': Phone
            '#input_mask': '(999) 999-9999'
            '#required': true
            '#data_type': String
            '#form_key': civicrm_1_contact_1_cg1_custom_2
            '#extra':
              width: 20
            '#parent': civicrm_1_contact_1_cg1_fieldset
      registration_section:
        '#type': webform_section
        '#title': Registration
        '#title_tag': h3
        registration_container:
          '#type': container
          century_registration:
            '#type': checkbox
            '#title': 'Century registration'
            '#description': 'Member fee is $50. Members must log in for member-pricing.'
            '#description_display': after
            '#default_value': true
            '#return_value': '1'
          civicrm_1_participant_1_participant_fee_amount:
            '#type': civicrm_number
            '#title': Fee
            '#title_display': invisible
            '#field_prefix': $
            '#autocomplete': ''
            '#readonly': true
            '#states':
              invisible:
                ':input[name="century_registration"]':
                  unchecked: true
            '#default_value': '60'
            '#options': yes_no
            '#extra':
              aslist: 1
              multiple: 0
            '#form_key': civicrm_1_participant_1_participant_fee_amount
            '#parent': contact_pagebreak
      section_waiver:
        '#type': webform_section
        '#title': 'Agree to the waiver'
        '#description': |-
          <p>You must indicate that you have read the waiver and agree to the waiver.</p>

          <h4>&nbsp;<a href="/event-waiver" target="_blank">Read the waiver</a>.</h4>
        '#title_tag': h3
        i_have_read_the_waiver:
          '#type': checkbox
          '#title': 'I have read the waiver'
          '#title_display': inline
          '#required': true
        civicrm_1_participant_1_cg5_custom_7:
          '#type': civicrm_options
          '#title': 'Agree to the waiver'
          '#title_display': none
          '#civicrm_live_options': 0
          '#options':
            1: 'I agree to the waiver'
          '#required': true
          '#required_error': 'You must agree to the waiver'
          '#states':
            visible:
              ':input[name="i_have_read_the_waiver"]':
                checked: true
          '#form_key': civicrm_1_participant_1_cg5_custom_7
          '#parent': contact_pagebreak
          '#default_option': ''
          '#default_value': ''
      civicrm_1_contact_1_contact_contact_id:
        '#type': hidden
        '#form_key': civicrm_1_contact_1_contact_contact_id
        '#parent': civicrm_1_contact_1_fieldset_fieldset
        '#extra': {  }
        '#title': 'Contact ID'
      civicrm_1_contact_1_contact_user_id:
        '#type': hidden
        '#form_key': civicrm_1_contact_1_contact_user_id
        '#parent': civicrm_1_contact_1_fieldset_fieldset
        '#extra': {  }
        '#title': 'User ID'
  contribution_pagebreak:
    '#type': webform_wizard_page
    '#form_key': contribution_pagebreak
    '#title': Payment
    civicrm_1_contribution_1_contribution_is_test:
      '#type': hidden
      '#expose_list': true
      '#value': '0'
      '#form_key': civicrm_1_contribution_1_contribution_is_test
      '#extra': {  }
      '#parent': contribution_pagebreak
      '#title': 'Payment Processor Mode'
