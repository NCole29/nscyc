    civicrm_1_contact_1_email_email:
      '#type': email
      '#title': Email
  flexbox_01:
    '#type': webform_flexbox
  positions_header:
    '#type': webform_markup
    '#markup': '<h3>Positions</h3>'
  positions:
    '#type': checkboxes
    '#title': Positions
    '#title_display': invisible
    '#options':
      'Parking Lot attendants: 6 am to 9 am': 'Parking Lot attendants: 6 am to 9 am -- Manage the parking areas for safety'
      'Registration: 6am-9am': 'Registration: 6am-9am -- Sign in pre-registered participants and hand them their BSC jerseys and help set up the area'
      'Rest Stop Set Up and Supply distribution: 6:30am-9am': 'Rest Stop Set Up and Supply distribution: 6:30am-9am -- Work with the Rest Stop set up crew and the box truck to set up rest stops 2, 3 and 4 and to distribute supplies and set up the tables and canopies.'
      'Set Up Triton Lunch Area: 8:30am-9:30am': 'Set Up Triton Lunch Area: 8:30am-9:30am -- Includes working with Mark Shamon setting up the large canopy, kitchen area, tables and chairs'
      'Runner for the Day': 'Runner for the Day -- Assist with the Rest Stop Crew distributing the supplies, be available at Triton to run to rest stops when/if needed, assist at Triton with other needs'
      'Rest Stop 1: Sanborn Memorial School - 7:30am-11:15am': 'Rest Stop 1: Sanborn Memorial School - 7:30am-11:15am -- Join Karen and Jeff Ontell and Neal Schuster to engage with and serve the century riders.'
      'Rest Stop 2: Maudslay State Park - 7:30am to 11:15am ': 'Rest Stop 2: Maudslay State Park - 7:30am to 11:15am  -- Join Faith Delaney to engage with and serve primarily the riders riding the 35, 50, metric and 80 mile routes'
      'Rest Stop 3: Newbury Elementary - 8am-1:15pm': 'Rest Stop 3: Newbury Elementary - 8am-1:15pm -- Join Lenny DeBenedictus and Candy Mulligan to engage with and serve primarily the century riders.'
      'Rest Stop 4: Bradley Palmer - 9am-12pm': 'Rest Stop 4: Bradley Palmer - 9am-12pm -- Join Mark Shamon to engage with and serve the metric, 80 mile and century riders.'
      'Rest Stop 4: Bradley Palmer - 12pm-3:15pm': 'Rest Stop 4: Bradley Palmer - 12pm-3:15pm -- Join Hillary Benson and Joe Hedrick to engage with and serve the metric, 80 mile and century riders.'
      'Roving sag: 7am-4pm ': 'Roving sag: 7am-4pm  -- Along with Jim Goldberg to be available on the road to assist riders'' non-emergency needs; mainly retrieving riders who can''t continue.'
      'Triton Lunch Crew: 10am-2pm': 'Triton Lunch Crew: 10am-2pm -- Assist Tony Salerno with food prep and engaging with and serving riders.'
      'Triton Lunch Crew: 2pm-5pm': 'Triton Lunch Crew: 2pm-5pm -- Assist Tony Salerno with food prep and engaging with and serving riders.'
      'Final Rider Sweep ': 'Final Rider Sweep  -- Drive the routes that have not been swept at 5 pm to be sure all riders have completed the ride. '
      Arrowing: 'Arrowing -- Work with the arrowing Ray Best to arrow the 5 Blazing Saddles routes'
      'Shut Down Triton: 4pm - 5pm': 'Shut Down Triton: 4pm - 5pm -- Be part of the team to close and clean Triton'
      'Administrative Tasks that arise': 'Administrative Tasks that arise -- Mainly affixing labels to the rider wristbands'
      'Communication and promotion': 'Communication and promotion -- Promoting the Century on other clubs FaceBook pages and websites where possible'
    '#options__properties': ''
    '#required': true
  tshirt_size:
    '#type': select
    '#title': 'T-shirt size (first-time volunteers)'
    '#options':
      S: S
      M: M
      L: L
      XL: XL
      XXL: XXL
    '#empty_option': 'Select size'
