uuid: 5b2b7dfc-17e6-4e87-a78a-a0a460f244cc
langcode: en
status: true
dependencies:
  config:
    - node.type.announcement
    - node.type.event
    - node.type.page
    - node.type.webform
  module:
    - content_moderation
id: editorial
label: Editorial
type: content_moderation
type_settings:
  states:
    archived:
      label: Archived
      weight: 3
      published: false
      default_revision: true
    draft:
      label: Draft
      weight: -4
      published: false
      default_revision: false
    publish_and_notify:
      label: 'Published (notify author)'
      weight: 1
      published: true
      default_revision: true
    published:
      label: Published
      weight: 2
      published: true
      default_revision: true
    ready_for_review:
      label: 'Ready for review'
      weight: -3
      published: false
      default_revision: false
  transitions:
    archive:
      label: Archive
      from:
        - draft
        - publish_and_notify
        - published
      to: archived
      weight: 2
    create_new_draft:
      label: 'Create new draft'
      from:
        - archived
        - draft
        - publish_and_notify
        - published
        - ready_for_review
      to: draft
      weight: -5
    finalize_draft:
      label: Review
      from:
        - archived
        - draft
      to: ready_for_review
      weight: -4
    publish:
      label: Publish
      from:
        - archived
        - draft
        - publish_and_notify
        - published
        - ready_for_review
      to: published
      weight: 1
    publish_notify:
      label: 'Publish & notify'
      from:
        - ready_for_review
      to: publish_and_notify
      weight: 0
  entity_types:
    node:
      - announcement
      - event
      - page
      - webform
  default_moderation_state: draft
