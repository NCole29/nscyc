name: Club
type: profile
description: 'Bike Club Sites distribution profile.'
core_version_requirement: ^9.0  || ^10
langcode: en
distribution:
  name: "Bike Club Sites on Drupal"
# version: 1.1

# Dependencies are required and cannot be uninstalled.
# Dependencies of these are installed automatically: field, filter, text, system.
dependencies:
  # core
  - drupal:block
  - drupal:block_content
  - drupal:breakpoint
  - drupal:config
  - drupal:contact
  - drupal:contextual
  - drupal:datetime
  - drupal:dynamic_page_cache
  - drupal:field_ui
  - drupal:file
  - drupal:help
  - drupal:image
  - drupal:link
  - drupal:media
  - drupal:media_library
  - drupal:menu_link_content
  - drupal:menu_ui
  - drupal:node
  - drupal:options
  - drupal:page_cache
  - drupal:path
  - drupal:syslog
  - drupal:taxonomy
  - drupal:text
  - drupal:toolbar
  - drupal:update
  - drupal:user
  - drupal:views

# Modules that are installed by default and CAN be uninstalled.
# Dependencies of these are installed automatically - e.g., editor, layout_discovery.
install:
  - drupal:automated_cron
  - drupal:ckeditor
  - drupal:ckeditor5
  - drupal:layout_builder
  - drupal:responsive_image
  - drupal:shortcut
  - drupal:views_ui

  # Contrib - global, not associated with specific club submodules.
  # Dependencies of these are installed automatically: ctools, path, path alias, token, toolbar.
  - admin_toolbar:admin_toolbar
  - admin_toolbar_tools:admin_toolbar_tools
  - admin_toolbar_tools:admin_toolbar_links_access_filter
  - allowed_formats:allowed_formats
  - drupal:big_pipe
  - crop:crop
  - css_editor:css_editor
  - csv_serialization:csv_serialization
  - disable_messages:disable_messages
  - fontawesome:fontawesome
  - honeypot:honeypot
  - layout_builder_admin_theme:layout_builder_admin_theme
  - layout_builder_restrictions:layout_builder_restrictions
  - linkit:linkit
  - masquerade:masquerade
  - mail_login:mail_login
  - paragraphs:layout_paragraphs
  - paragraphs:paragraphs
  - pathauto:pathauto
  - quick_node_clone:quick_node_clone
  - role_delegation:role_delegation
  - scheduler:scheduler
  - shortcutperrole:shortcutperrole
  - svg_image:svg_image
  - svg_image:svg_image_responsive
  - tac_lite:tac_lite
  - toolbar_menu:toolbar_menu
  - views_data_export:views_data_export
  - views_infinite_scroll:views_infinite_scroll
  - view_unpublished:view_unpublished
  - webform:webform
  - webform:webform_node
  - webform_views:webform_ui
  - webform_views:webform_views

  # Contrib
  # Taxonomies are installed by club_media and club_page modules.
  - club:club_announcement
  - club:club_cancellation
  - club:club_event
  - club:club_location
  - club:club_media
  - club:club_page
  - club:club_paragraph
  - club:club_ride
  - club:club_user
  - club:club_leader

  # Dev only
  - drupal:dblog
  - devel:devel
  - devel:devel_kint_extras
  - config_delete:config_delete
  - club:club_test
themes:
  - claro
  - clubtheme
