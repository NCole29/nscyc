langcode: en
status: true
dependencies:
  config:
    - filter.format.basic_html
  module:
    - ckeditor
format: basic_html
editor: ckeditor
settings:
  toolbar:
    rows:
      -
        -
          name: Formatting
          items:
            - Undo
            - Redo
            - Format
            - Bold
            - Italic
        -
          name: Lists
          items:
            - BulletedList
            - NumberedList
            - JustifyLeft
            - JustifyCenter
            - Outdent
            - Indent
        -
          name: Links
          items:
            - DrupalLink
            - DrupalUnlink
        -
          name: Media
          items:
            - DrupalMediaLibrary
            - Table
            - Blockquote
        -
          name: Tools
          items:
            - Styles
  plugins:
    drupallink:
      linkit_enabled: true
      linkit_profile: club
    stylescombo:
      styles: "p.small|Small text\r\np.light-button|Light button\r\np.dark-button|Dark button\r\np.light-centered|Light centered\r\np.dark-centered|Dark centered"
image_upload:
  status: true
  scheme: public
  directory: inline-images
  max_size: ''
  max_dimensions:
    width: null
    height: null
