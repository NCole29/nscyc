langcode: en
status: true
dependencies:
  config:
    - filter.format.full_html
  module:
    - ckeditor5
format: full_html
editor: ckeditor5
settings:
  toolbar:
    items:
      - undo
      - redo
      - heading
      - bold
      - italic
      - bulletedList
      - numberedList
      - alignment
      - outdent
      - indent
      - link
      - drupalMedia
      - insertTable
      - style
      - blockQuote
      - removeFormat
      - specialCharacters
      - sourceEditing
  plugins:
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
    ckeditor5_style:
      styles:
        -
          label: 'Small text'
          element: '<p class="small">'
        -
          label: 'Light button'
          element: '<p class="light-button">'
        -
          label: 'Dark button'
          element: '<p class="dark-button">'
        -
          label: 'Light centered'
          element: '<p class="light-centered">'
        -
          label: 'Dark centered'
          element: '<p class="dark-centered">'
    ckeditor5_sourceEditing:
      allowed_tags:
        - '<drupal-media data-caption title>'
    ckeditor5_list:
      reversed: true
      startIndex: true
    ckeditor5_alignment:
      enabled_alignments:
        - left
        - center
        - right
        - justify
    media_media:
      allow_view_mode_override: true
image_upload:
  status: true
  scheme: public
  directory: inline-images
  max_size: ''
  max_dimensions:
    width: null
    height: null
