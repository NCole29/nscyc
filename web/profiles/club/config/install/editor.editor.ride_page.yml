langcode: en
status: true
dependencies:
  config:
    - filter.format.ride_page
  module:
    - ckeditor5
format: ride_page
editor: ckeditor5
settings:
  toolbar:
    items:
      - undo
      - redo
      - heading
      - bold
      - italic
      - bulletedList
      - numberedList
      - alignment
      - link
      - drupalMedia
      - insertTable
      - blockQuote
      - removeFormat
  plugins:
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
    ckeditor5_list:
      reversed: true
      startIndex: true
    ckeditor5_alignment:
      enabled_alignments:
        - left
        - center
        - right
        - justify
    media_media:
      allow_view_mode_override: false
image_upload:
  status: false
  scheme: public
  directory: inline-images
  max_size: ''
  max_dimensions:
    width: null
    height: null
