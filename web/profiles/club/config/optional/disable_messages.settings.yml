disable_messages_enable: '1'
disable_messages_exclude_users: ''
disable_messages_filter_by_page: 1
disable_messages_page_filter_paths: admin/modules
disable_messages_enable_debug: '0'
disable_messages_debug_visible_div: '0'
disable_messages_ignore_patterns: 'There are security updates available for one or more of your modules or themes. To ensure the security of your server, you should update immediately! See the available updates page for more information and to install your missing updates.'
disable_messages_enable_permissions: '0'
disable_messages_ignore_exclude: '1'
disable_messages_ignore_case: '1'
disable_messages_strip_html_tags: '1'
disable_messages_ignore_regex:
  - '/^There are security updates available for one or more of your modules or themes. To ensure the security of your server, you should update immediately! See the available updates page for more information and to install your missing updates.$/i'
