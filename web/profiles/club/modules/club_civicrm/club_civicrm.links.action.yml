# Links to CiviCRM forms from Drupal listings on People page

# New individual contact
civicrm.civicrm_contact_add:
  route_name: 'civicrm.civicrm_contact_add'
  route_parameters:
    reset: 1
    ct: 'Individual'
  title: 'New contact'
  appears_on:
    - view.civicrm_contacts.contacts

# Register event participant
civicrm.civicrm_participant_add:
  route_name: 'civicrm.civicrm_participant_add'
  title: 'Register event participant'
  appears_on:
    - view.civicrm_contacts.participants

# New membership
civicrm.civicrm_member_add:
  route_name: 'civicrm.civicrm_member_add'
  route_parameters:
    reset: 1
    action: 'add'
  title: 'New membership'
  appears on:
    - view.civicrm_memberships.members
