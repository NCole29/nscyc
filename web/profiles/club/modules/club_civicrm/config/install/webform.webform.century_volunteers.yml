id: century_volunteers
title: 'Century volunteers'
description: "Click <strong>Build </strong>to edit positions&nbsp;and T-shirt field.<br />\r\nClick <strong>Settings</strong> and then at top of page:<br />\r\n&nbsp; - click&nbsp;<strong>Emails/Handlers </strong>to edit sign-up limits<br />\r\n&nbsp; - click <strong>Confirmation </strong>to edit the Confirmation message<br />\r\nDuplicate this form if making substantial changes.<br />\r\nCreate or clone an <strong>Event </strong>page and select this &quot;registration&nbsp;form.&quot;<br />\r\n<em>The same form may be used multiple times (with or without changes) without clearing results because results are associated with the event page.</em>"
category: 'Volunteer signup'
elements: |-
  civicrm_1_contact_1_contact_existing:
    '#type': civicrm_contact
    '#title': 'Contact information'
    '#widget': hidden
    '#none_prompt': 'Members - login to populate contact info'
    '#show_hidden_contact': 1
    '#results_display':
      display_name: display_name
    '#no_autofill':
      '': ''
    '#hide_fields':
      name: name
      phone: phone
      email: email
    '#hide_method': disable
    '#no_hide_blank': true
    '#submit_disabled': true
    '#default': user
    '#allow_url_autofill': false
    '#allow_create': 1
    '#contact_type': individual
    '#form_key': civicrm_1_contact_1_contact_existing
    '#parent': civicrm_1_contact_1_fieldset_fieldset
    '#extra': {  }
  flexbox:
    '#type': webform_flexbox
    civicrm_1_contact_1_contact_first_name:
      '#type': textfield
      '#counter_type': character
      '#counter_maximum': 64
      '#counter_maximum_message': ' '
      '#contact_type': individual
      '#form_key': civicrm_1_contact_1_contact_first_name
      '#extra':
        width: 20
      '#parent': civicrm_1_contact_1_fieldset_fieldset
      '#title': 'First Name'
    civicrm_1_contact_1_contact_last_name:
      '#type': textfield
      '#counter_type': character
      '#counter_maximum': 64
      '#counter_maximum_message': ' '
      '#contact_type': individual
      '#form_key': civicrm_1_contact_1_contact_last_name
      '#extra':
        width: 20
      '#parent': civicrm_1_contact_1_fieldset_fieldset
      '#title': 'Last Name'
  flexbox_01:
    '#type': webform_flexbox
    civicrm_1_contact_1_phone_phone:
      '#type': textfield
      '#counter_type': character
      '#counter_maximum': 32
      '#counter_maximum_message': ' '
      '#form_key': civicrm_1_contact_1_phone_phone
      '#extra':
        width: 20
      '#parent': civicrm_1_contact_1_fieldset_fieldset
      '#title': 'Phone Number'
    civicrm_1_contact_1_email_email:
      '#type': email
      '#form_key': civicrm_1_contact_1_email_email
      '#extra':
        width: 20
      '#parent': civicrm_1_contact_1_fieldset_fieldset
      '#title': Email
  positions:
    '#type': checkboxes
    '#title': Positions
    '#options':
      'Setup at Triton: 6am-8am': 'Setup at Triton: 6am-8am -- Includes setting up the large canopy, tables and chairs'
      'Registration: 6am-9am': 'Registration: 6am-9am -- Sign in pre-registered participants and hand them their swag bag.'
      'Distribute supplies: 7am-9am': 'Distribute supplies: 7am-9am -- Work with Lenny Ortins and others going with the box truck to rest stops 2, 3 and 4 to distribute supplies and set up the tables and canopies.'
      'Rest Stop 1: Sanborn Memorial School - 8am-11am': 'Rest Stop 1: Sanborn Memorial School - 8am-11am -- Join Karen and Jeff Ontell and Neal Schuster to engage and with and serve the century riders.'
      'Rest Stop 2: Maudslay State Park - 8am to 11am ': 'Rest Stop 2: Maudslay State Park - 8am to 11am  -- Join Faith Delaney to engage with and serve primarily the riders riding the 35, 50 and metric'
      'Rest Stop 3: Newbury Elementary - 8am-2pm': 'Rest Stop 3: Newbury Elementary - 8am-2pm -- Join Lenny DeBenedictus, Candy Mulligam and Terry and Greg Morose to engage with and serve primarily the century riders.'
      'Rest Stop 4: Bradley Palmer - 9am-12pm': 'Rest Stop 4: Bradley Palmer - 9am-12pm -- Join Mark Shamon to engage with and serve the metric and century riders.'
      'Rest Stop 4: Bradley Palmer - 12pm-4pm': 'Rest Stop 4: Bradley Palmer - 12pm-4pm -- Join Hillary Benson and Joe Hedrick to engage with and serve the metric and century riders.'
      'Roving sag: 7am-4pm ': 'Roving sag: 7am-4pm  -- Along with Jim Goldberg to be available on the road to assist riders'' non-emergency needs; mainly retrieving riders who can''t continue.'
      'Help at Triton: 10am-2pm': 'Help at Triton: 10am-2pm -- Assist Tony Salerno with food prep and serving.'
      'Help at Triton: 2pm--5pm': 'Help at Triton: 2pm--5pm -- Assist Tony Salerno with food prep and serving.'
      'Final Rider Sweep ': 'Final Rider Sweep  -- Drive the routes that have not been swept at 5 pm to assure all riders have completed the ride. '
      Arrowing: 'Arrowing -- Work with Ray Best to arrow the 4 Blazing Saddles routes'
  tshirt_size:
    '#type': select
    '#title': 'T-shirt size (first-time volunteers)'
    '#options':
      S: S
      M: M
      L: L
      XL: XL
      XXL: XXL
    '#empty_option': 'Select size'
  civicrm_1_contact_1_fieldset_fieldset:
    '#type': fieldset
    '#title': 'Contact information'
    '#form_key': civicrm_1_contact_1_fieldset_fieldset
    civicrm_1_contact_1_contact_user_id:
      '#type': hidden
      '#form_key': civicrm_1_contact_1_contact_user_id
      '#parent': civicrm_1_contact_1_fieldset_fieldset
      '#extra': {  }
      '#title': 'User ID'
