# Routes for Club_contacts
entity.club_contacts.canonical:
  path: '/admin/club_contacts/{club_contacts}'
  defaults:
    # Calls the view controller defined in the annotation of the contact entity.
    _entity_view: 'club_contacts'
    _title: 'Club leaders'
  requirements:
    # Calls the access controller of the entity, passing in the suffix ('view')
    # as the $operation parameter to checkAccess().
    _permission: 'view club_contact entity'

# We assign this same path to our view to override the default 'list' builder
# and add sortable columns and filters.
entity.club_contacts.collection:
  path: '/admin/club_contacts/list'
  defaults:
  # Calls the list controller, defined in the annotation of the contact entity.
    _entity_list: 'club_contacts'
    _title: 'Club leaders list'
  requirements:
    _permission: 'view club_contact entity'

entity.club_contacts.edit_form:
  path: '/admin/club_contacts/{club_contacts}/edit'
  defaults:
    _entity_form: club_contacts.default
    _title: 'Edit club leader'
  requirements:
    _permission: 'edit club_contact entity'

entity.club_contacts.delete_form:
  path: '/admin/club_contacts/{club_contacts}/delete'
  defaults:
    _entity_form: club_contacts.delete
    _title: 'Delete club leader'
  requirements:
    _permission: 'delete club_contact entity'

club_leader.contact_settings:
  path: '/admin/structure/club_contacts_settings'
  defaults:
    _form: '\Drupal\club_leader\Form\ContactSettingsForm'
    _title: 'Club leaders'
  requirements:
    _permission: 'administer club_contact entity'

club_leader.contact_add:
  path: '/admin/club_contacts/add'
  defaults:
    _entity_form: club_contacts.default
    _title: 'Add club leader'
  requirements:
    _permission: 'add club_contact entity'

