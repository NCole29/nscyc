club_ride.route_settings:
  path: '/admin/structure/club_route_settings'
  defaults:
    _form: '\Drupal\club_ride\Form\ClubRouteSettingsForm'
    _title: 'Club route'
  requirements:
    _permission: 'administer club_route entity'

entity.club_route.canonical:
  path: '/admin/club_route/{club_route}'
  defaults:
    _entity_view: 'club_route'
    _title: 'Club route'
  requirements:
    _permission: 'view club_route entity'

entity.club_route.collection:
  path: '/admin/club_route/list'
  defaults:
    _entity_list: 'club_route'
    _title: 'Club route list'
  requirements:
    _permission: 'view club_route entity'

entity.club_route.edit_form:
  path: '/admin/club_route/{club_route}/edit'
  defaults:
    _entity_form: club_route.default
    _title_callback: '\Drupal\Core\Entity\Controller\EntityController::title'
  requirements:
    _permission: 'edit club_route entity'

entity.club_route.delete_form:
  path: '/admin/club_route/{club_route}/delete'
  defaults:
    _entity_form: club_route.delete
    _title: 'Delete route'
  requirements:
    _permission: 'delete club_route entity'

entity.club_route.multiple_delete_confirm:
  path: '/admin/club_route/delete'
  defaults:
    _form: 'Drupal\club_ride\Form\CluRouteEntityDeleteMultipleForm'
  requirements:
    _permission: 'delete club_route entity'

club_ride.route_add:
  path: '/admin/club_route/add'
  defaults:
    _entity_form: club_route.default
    _title: 'Add route'
  requirements:
    _permission: 'add club_route entity'

club_ride.admin_settings_form:
  path: '/admin/config/club/rwgps'
  defaults:
    _form: '\Drupal\club_ride\Form\RwgpsAPIForm'
    _title: 'RWGPS API Form'
  requirements:
    _permission: 'administer rwgps_api_form'
  options:
    _admin_route: TRUE

club_ride.cancel:
  path: '/admin/cancel-ride'
  defaults:
    _form: '\Drupal\club_ride\Form\RideCancellationForm'
    _title: 'Cancel ride'
  requirements:
    _permission: 'create ride content'
    _access: 'TRUE'

club_ride.nonmember:
  path: '/admin/add-nonmembers'
  defaults:
    _form: '\Drupal\club_ride\Form\NonmemberForm'
    _title: 'Enter nonmembers from waiver form'
  requirements:
    _permission: 'enter waivers'
    _access: 'TRUE'    
   
club_ride.ride_tools:
  path: '/admin/ride_tools'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: 'Ride tools'
  requirements:
    _permission: 'access toolbar'

