third_party_settings:
  field_group:
    group_date_and_time:
      children:
        - title
        - field_multiple_times
        - field_time
        - group_date
      label: 'Basic info'
      region: content
      parent_name: group_tab_container
      weight: 0
      format_type: tab
      format_settings:
        classes: ''
        show_empty_fields: false
        id: ''
        formatter: open
        description: ''
        required_fields: true
    group_location_and_routes:
      children:
        - field_location
        - field_rwgps_routes
      label: 'Location and routes'
      region: content
      parent_name: group_tab_container
      weight: 3
      format_type: tab
      format_settings:
        classes: ''
        id: ''
        formatter: closed
        description: ''
        required_fields: true
    group_description:
      children:
        - field_activity
        - field_ride_picture
        - field_description
        - field_additional_information
        - field_developed_by
      label: 'Description, picture, additional info'
      region: content
      parent_name: group_tab_container
      weight: 4
      format_type: tab
      format_settings:
        classes: ''
        show_empty_fields: false
        id: ''
        formatter: closed
        description: 'Documents, such as cue sheets, may be added in the description field by clicking the media icon on the editor toolbar.'
        required_fields: true
    group_ride_leader_s_:
      children:
        - field_show_and_go
        - field_ride_leader
      label: 'Ride leader(s)'
      region: content
      parent_name: group_tab_container
      weight: 1
      format_type: tab
      format_settings:
        classes: ''
        show_empty_fields: false
        id: ''
        formatter: closed
        description: ''
        required_fields: true
    group_tab_container:
      children:
        - group_date_and_time
        - group_ride_leader_s_
        - group_location_and_routes
        - group_description
      label: 'Tab container'
      region: content
      parent_name: ''
      weight: 0
      format_type: tabs
      format_settings:
        classes: ''
        show_empty_fields: false
        id: ''
        direction: horizontal
        width_breakpoint: 320
    group_date:
      children:
        - field_datetime
      label: Date
      region: hidden
      parent_name: group_date_and_time
      weight: 9
      format_type: details
      format_settings:
        classes: ''
        show_empty_fields: false
        id: ''
        open: true
        description: "Duration = 'None' because only the Start date and time are displayed regardless of duration.<br>\r\nIf the ride details differ each week, enter a single date and clone the ride to post different details on different dates. The ride name can be the same on different records."
        required_fields: false
id: node.recurring_ride.default
targetEntityType: node
bundle: recurring_ride
mode: default
content:
  field_activity:
    type: options_select
    weight: 4
    region: content
    settings: {  }
    third_party_settings: {  }
  field_additional_information:
    type: text_textarea
    weight: 7
    region: content
    settings:
      rows: 5
      placeholder: ''
    third_party_settings:
      allowed_formats:
        hide_help: '1'
        hide_guidelines: '1'
  field_datetime:
    type: smartdate_default
    weight: 10
    region: content
    settings:
      modal: false
      default_duration: 60
      default_duration_increments: |-
        30
        60|1 hour
        90
        120|2 hours
        custom
      show_extra: false
      hide_date: false
    third_party_settings:
      smart_date_recur:
        modal: true
        allowed_recur_freq_values:
          MINUTELY: '0'
          HOURLY: '0'
          DAILY: '0'
          WEEKLY: WEEKLY
          MONTHLY: MONTHLY
          YEARLY: '0'
  field_description:
    type: text_textarea
    weight: 6
    region: content
    settings:
      rows: 5
      placeholder: ''
    third_party_settings:
      allowed_formats:
        hide_help: '1'
        hide_guidelines: '1'
  field_developed_by:
    type: string_textfield
    weight: 8
    region: content
    settings:
      size: 60
      placeholder: ''
    third_party_settings: {  }
  field_location:
    type: entity_reference_autocomplete
    weight: 6
    region: content
    settings:
      match_operator: CONTAINS
      match_limit: 10
      size: 60
      placeholder: ''
    third_party_settings: {  }
  field_multiple_times:
    type: boolean_checkbox
    weight: 8
    region: content
    settings:
      display_label: true
    third_party_settings: {  }
  field_ride_leader:
    type: entity_reference_autocomplete
    weight: 7
    region: content
    settings:
      match_operator: CONTAINS
      match_limit: 10
      size: 60
      placeholder: ''
    third_party_settings: {  }
  field_ride_picture:
    type: media_library_widget
    weight: 5
    region: content
    settings:
      media_types: {  }
    third_party_settings: {  }
  field_rwgps_routes:
    type: entity_reference_autocomplete
    weight: 7
    region: content
    settings:
      match_operator: CONTAINS
      match_limit: 10
      size: 60
      placeholder: ''
    third_party_settings: {  }
  field_show_and_go:
    type: boolean_checkbox
    weight: 6
    region: content
    settings:
      display_label: true
    third_party_settings: {  }
  field_time:
    type: string_textfield
    weight: 10
    region: content
    settings:
      size: 60
      placeholder: 'Enter time and condition. E.g., 9 am for long ride'
    third_party_settings: {  }
  status:
    type: boolean_checkbox
    weight: 1
    region: content
    settings:
      display_label: true
    third_party_settings: {  }
  title:
    type: string_textfield
    weight: 7
    region: content
    settings:
      size: 60
      placeholder: ''
    third_party_settings: {  }
  uid:
    type: entity_reference_autocomplete
    weight: 2
    region: content
    settings:
      match_operator: CONTAINS
      match_limit: 10
      size: 60
      placeholder: ''
    third_party_settings: {  }
