description: 'Use <em>ride</em> to add a nonrecurring ride to the calendar. If adding an existing ride on a new date, find that ride in <em>Content</em> and clone it.<br> Rides automatically appear in the <em>upcoming</em> block on the home page.'
help: "<h5>Instructions</h5>\r\nComplete the form to create a <strong>NEW</strong> ride.<br>\r\nTo put an <strong>existing</strong> ride on the calendar on a new date, <a href=\"/admin/content/rides\">find that ride</a>, clone the ride page, and edit relevant fields. <br><br>\r\n"
