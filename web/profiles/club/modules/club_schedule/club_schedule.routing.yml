club_schedule.schedule_settings:
  path: '/admin/structure/club_schedule_settings'
  defaults:
    _form: '\Drupal\club_schedule\Form\ClubScheduleSettingsForm'
    _title: 'Ride schedule settings'
  requirements:
    _permission: 'administer club_schedule entity'

entity.club_schedule.canonical:
  path: '/admin/club_schedule/{club_schedule}'
  defaults:
    _entity_view: 'club_schedule'
    _title: 'Schedule of ride dates'
  requirements:
    _permission: 'view club_schedule entity'

entity.club_schedule.collection:
  path: '/admin/club_schedule/list'
  defaults:
    _entity_list: 'club_schedule'
    _title: 'Schedule of ride dates'
  requirements:
    _permission: 'view club_schedule entity'

entity.club_schedule.edit_form:
  path: '/admin/club_schedule/{club_schedule}/edit'
  defaults:
    _entity_form: club_schedule.default
    _title: 'Edit schedule date'
  requirements:
    _permission: 'edit club_schedule entity'
